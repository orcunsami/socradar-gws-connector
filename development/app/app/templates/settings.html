{% extends "base.html" %}
{% block content %}
<h1>Settings</h1>
<form method="post" action="/settings" class="form">
  <input type="hidden" name="csrf" value="{{ csrf }}">

  <fieldset>
    <legend>Tenant scope</legend>
    <label>Verified domains <span class="muted small">(comma-separated; lookups outside these are skipped — they return 403, not 404)</span></label>
    <input type="text" name="verified_domains" value="{{ verified_domains }}" placeholder="example.com, sub.example.com">
  </fieldset>

  <fieldset>
    <legend>Tenant identity <span class="muted small">(MSSP — the org impersonated for this tenant)</span></legend>
    <label>Org super-admin to impersonate <span class="muted small">(must be an email in a verified domain above; blank = the deployment's global default)</span></label>
    <input type="text" name="admin_subject" value="{{ tenant.admin_subject }}" placeholder="admin@example.com">
    <label>Service account override <span class="muted small">(blank = the shared SOCRadar SA)</span></label>
    <input type="text" name="service_account" value="{{ tenant.service_account }}" placeholder="leave blank for the default">
  </fieldset>

  <fieldset>
    <legend>SOCRadar feed</legend>
    <label>Base URL</label>
    <input type="text" name="feed_base" value="{{ tenant.feed_base }}">
    <label>Company ID</label>
    <input type="text" name="feed_company_id" value="{{ tenant.feed_company_id }}">
    <label>Start date (discovery date filter — keep it narrow)</label>
    <input type="text" name="feed_start_date" value="{{ tenant.feed_start_date }}" placeholder="YYYY-MM-DD">
    <label>API key <span class="muted small">(leave blank to keep the current key)</span></label>
    <input type="password" name="feed_api_key" value="" placeholder="{{ '•••• currently set' if tenant.feed_api_key else 'not set' }}">
  </fieldset>

  <fieldset>
    <legend>Remediation actions <span class="muted small">(off by default; destructive)</span></legend>
    {% for key, meta in actions.items() %}
    <label class="check">
      <input type="checkbox" name="enabled_actions" value="{{ key }}" {% if key in enabled %}checked{% endif %}>
      {{ meta.label }} <span class="muted small">scope: {{ meta.scope.split('/')[-1] }}{% if meta.needs_group %} · needs quarantine group{% endif %}</span>
    </label>
    {% endfor %}
    <label style="margin-top:12px">Quarantine group email <span class="muted small">(required for add/remove-from-group actions)</span></label>
    <input type="text" name="quarantine_group" value="{{ tenant.quarantine_group }}" placeholder="quarantine@yourdomain.com">
  </fieldset>

  <button class="btn primary" type="submit">Save settings</button>
</form>
{% endblock %}
